name: Scrape Cruz Roja flags

# Scrapea las banderas de Cruz Roja desde el runner de GitHub (IP no-Render) y
# commitea backend/data/flags.json, que el backend sirve como fuente primaria.
# (En Render el scrape en vivo da 403 por el WAF F5; esto lo desacopla.)

on:
  schedule:
    # Cruz Roja solo iza bandera en horario de vigilancia (11:30–19:30 Madrid, a
    # diario). Scrapear antes de las 11:30 captura "No hay información" y mostraría
    # "Desconocida". Disparamos cada 2h a :35 (menos cola que en :00) cubriendo el
    # horario: 08:35,10:35,12:35,14:35,16:35 UTC = 10:35,12:35,14:35,16:35,18:35 Madrid.
    - cron: '35 8-16/2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-flags
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Scrape flags
        run: npm run scrape:flags

      - name: Commit flags.json if changed
        run: |
          if [[ -n "$(git status --porcelain data/flags.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/flags.json
            git commit -m "chore(flags): actualizar banderas Cruz Roja [skip ci]"
            git push
          else
            echo "Sin cambios en flags.json"
          fi
