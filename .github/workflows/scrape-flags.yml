name: Scrape Cruz Roja flags

# Scrapea las banderas de Cruz Roja desde el runner de GitHub (IP no-Render) y
# commitea backend/data/flags.json, que el backend sirve como fuente primaria.
# (En Render el scrape en vivo da 403 por el WAF F5; esto lo desacopla.)

on:
  schedule:
    # Cruz Roja solo iza bandera en horario de vigilancia (11:30–19:30 Madrid, a
    # diario). Scrapear antes de las 11:30 captura "No hay información" para todas;
    # por eso el primer disparo debe caer DESPUÉS del izado en ambas estaciones DST.
    # Cada 2h a :35 (menos cola que en :00): 10:35,12:35,14:35,16:35 UTC =
    # 12:35,14:35,16:35,18:35 Madrid (verano) / 11:35,13:35,15:35,17:35 (invierno).
    # (Además, scrape-flags.ts no sobrescribe flags.json si 0 banderas con color.)
    - cron: '35 10-16/2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-flags
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Scrape flags
        run: npm run scrape:flags

      - name: Commit flags.json if changed
        run: |
          if [[ -n "$(git status --porcelain data/flags.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/flags.json
            git commit -m "chore(flags): actualizar banderas Cruz Roja [skip ci]"
            git push
          else
            echo "Sin cambios en flags.json"
          fi
