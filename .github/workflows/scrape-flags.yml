name: Scrape Cruz Roja flags

# Scrapea las banderas de Cruz Roja desde el runner de GitHub (IP no-Render) y
# commitea backend/data/flags.json, que el backend sirve como fuente primaria.
# (En Render el scrape en vivo da 403 por el WAF F5; esto lo desacopla.)

on:
  # Al desplegar (push a main) refrescamos las banderas para que producción no
  # tenga que esperar al siguiente disparo del cron. Fuera de horario de vigilancia
  # el scrape devuelve "No hay información" y scrape-flags.ts NO sobrescribe (0
  # banderas con color), así que es seguro. El auto-commit lleva "[skip ci]", que
  # GitHub respeta para no reencadenar este workflow (sin bucle).
  push:
    branches: [main]
  schedule:
    # Cruz Roja iza bandera en horario de vigilancia (11:30–19:30 Madrid, a diario,
    # en temporada de verano). Scrapeamos CADA HORA a :30 durante toda la franja para
    # reflejar cambios de bandera cuanto antes.
    # Optimizado para VERANO (CEST = UTC+2): 09:30–17:30 UTC = 11:30–19:30 Madrid (9
    # pasadas). El primer disparo (11:30 Madrid) coincide con el izado; si aún no hay
    # bandera, scrape-flags.ts NO sobrescribe flags.json (0 con color) y la siguiente
    # pasada la recoge — además el cron de GitHub suele retrasarse, cayendo tras el izado.
    # En invierno (CET = UTC+1) esto sería 10:30–18:30 Madrid, pero fuera de temporada
    # no hay banderas izadas, así que esas pasadas son no-op (no sobrescriben).
    - cron: '30 9-17 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-flags
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Scrape flags
        run: npm run scrape:flags

      - name: Commit flags.json if changed
        run: |
          if [[ -n "$(git status --porcelain data/flags.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/flags.json
            git commit -m "chore(flags): actualizar banderas Cruz Roja [skip ci]"
            git push
          else
            echo "Sin cambios en flags.json"
          fi
